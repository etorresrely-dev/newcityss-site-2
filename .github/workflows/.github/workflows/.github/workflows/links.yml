name: Check Links

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest

    steps:
      - name: Check production site links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress https://newcityss.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
