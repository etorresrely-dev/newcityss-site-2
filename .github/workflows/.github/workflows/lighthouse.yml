name: Lighthouse

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install serve
        run: npm install -g serve

      - name: Serve production build
        run: |
          serve -s dist -l 4173 &
          sleep 5

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun --collect.url=http://127.0.0.1:4173
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
