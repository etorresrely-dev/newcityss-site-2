name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          test -f netlify.toml
          test -f logo-primary.png
          test -f hero-city.webp
          test -f service-access.png
          test -f service-ai.png
          test -f service-intercom.png
          test -f service-surveillance.png
